services:
  - type: web
    name: nail-ai-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://frontend-red-nine-72.vercel.app
      - key: HF_TOKEN
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
